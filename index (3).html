<!DOCTYPE html>
<html lang="pt-MZ">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Quiz – Vender no WhatsApp em 2026</title>
<meta name="description" content="Descobre o teu nível de vendas no WhatsApp em 2026 e desbloqueia o e-book oficial para Moçambique." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  /* =========================================================
     RESET & BASE
  ========================================================= */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    background: #000;
    color: #fff;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    line-height: 1.5;
    overflow-x: hidden;
    letter-spacing: -0.011em;
  }

  /* Aurora background */
  body::before {
    content: '';
    position: fixed;
    inset: -20%;
    background:
      radial-gradient(circle at 20% 0%, rgba(0, 200, 83, 0.18), transparent 45%),
      radial-gradient(circle at 80% 20%, rgba(0, 180, 120, 0.12), transparent 50%),
      radial-gradient(circle at 50% 100%, rgba(0, 200, 83, 0.10), transparent 55%);
    filter: blur(40px);
    pointer-events: none;
    z-index: 0;
    animation: aurora 18s ease-in-out infinite alternate;
  }
  @keyframes aurora {
    0%   { transform: translate3d(0,0,0) scale(1); }
    50%  { transform: translate3d(-3%, 2%, 0) scale(1.05); }
    100% { transform: translate3d(3%, -2%, 0) scale(1.02); }
  }

  /* Subtle grain */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    opacity: 0.035;
    mix-blend-mode: overlay;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  }

  /* =========================================================
     LAYOUT
  ========================================================= */
  .app {
    position: relative;
    z-index: 2;
    max-width: 500px;
    margin: 0 auto;
    padding: 24px 20px 60px;
    min-height: 100vh;
    animation: appEnter 0.9s cubic-bezier(0.22, 1, 0.36, 1) both;
  }
  @keyframes appEnter {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* =========================================================
     TOP BADGE
  ========================================================= */
  .top-badge {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin: 0 auto 22px;
    padding: 8px 14px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius: 999px;
    font-size: 12px;
    font-weight: 500;
    color: rgba(255,255,255,0.78);
    width: fit-content;
    letter-spacing: 0.01em;
  }
  .top-badge .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: #00C853;
    box-shadow: 0 0 10px #00C853;
    animation: pulseDot 1.6s ease-in-out infinite;
  }
  @keyframes pulseDot {
    0%, 100% { transform: scale(1); opacity: 1; }
    50%      { transform: scale(1.4); opacity: 0.6; }
  }

  /* =========================================================
     HEADER
  ========================================================= */
  .header {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: 6px 0 28px;
  }

  /* 🔁 ALTERAR FOTO DE PERFIL: troca o conteúdo de .avatar ou usa <img src="..."> */
  .avatar {
    position: relative;
    width: 78px;
    height: 78px;
    border-radius: 50%;
    background: linear-gradient(135deg, #00E676, #009f43);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 30px;
    font-weight: 700;
    color: #000;
    margin-bottom: 20px;
    box-shadow:
      0 10px 40px rgba(0, 200, 83, 0.35),
      0 0 0 1px rgba(255, 255, 255, 0.08) inset;
    animation: float 5s ease-in-out infinite;
  }
  .avatar::after {
    content: '';
    position: absolute;
    inset: -6px;
    border-radius: 50%;
    border: 1px solid rgba(0, 200, 83, 0.35);
    animation: ring 2.6s ease-out infinite;
  }
  @keyframes ring {
    0%   { transform: scale(0.9); opacity: 0.9; }
    100% { transform: scale(1.4); opacity: 0; }
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-4px); }
  }

  .title {
    font-size: 24px;
    font-weight: 700;
    letter-spacing: -0.028em;
    line-height: 1.2;
    max-width: 340px;
    background: linear-gradient(180deg, #fff 0%, #c7c7c7 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .subtitle {
    margin-top: 10px;
    font-size: 14px;
    color: rgba(255,255,255,0.55);
    max-width: 320px;
    line-height: 1.5;
  }

  /* =========================================================
     PROGRESS BAR
  ========================================================= */
  .progress-wrap {
    width: 100%;
    height: 3px;
    background: rgba(255, 255, 255, 0.06);
    border-radius: 3px;
    overflow: hidden;
    margin-bottom: 10px;
    position: relative;
  }
  .progress-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #00C853, #00ff8a);
    box-shadow: 0 0 14px rgba(0, 200, 83, 0.7);
    border-radius: 3px;
    transition: width 0.6s cubic-bezier(0.22, 1, 0.36, 1);
    position: relative;
  }
  .progress-bar::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.45), transparent);
    animation: shimmer 2s linear infinite;
  }
  @keyframes shimmer {
    0%   { transform: translateX(-100%); }
    100% { transform: translateX(100%); }
  }
  .progress-meta {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: rgba(255,255,255,0.4);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 28px;
  }

  /* =========================================================
     QUIZ
  ========================================================= */
  .question {
    animation: slideIn 0.55s cubic-bezier(0.22, 1, 0.36, 1) both;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(16px); filter: blur(4px); }
    to   { opacity: 1; transform: translateY(0); filter: blur(0); }
  }
  .question.out {
    animation: slideOut 0.3s cubic-bezier(0.4, 0, 1, 1) both;
  }
  @keyframes slideOut {
    to { opacity: 0; transform: translateY(-12px); filter: blur(4px); }
  }

  .question-label {
    font-size: 11px;
    color: #00C853;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    margin-bottom: 12px;
    font-weight: 600;
  }

  .question-text {
    font-size: 22px;
    font-weight: 600;
    line-height: 1.25;
    margin-bottom: 26px;
    letter-spacing: -0.025em;
  }

  .options { display: flex; flex-direction: column; gap: 10px; }

  .option {
    position: relative;
    background: rgba(17,17,17,0.85);
    border: 1px solid rgba(255, 255, 255, 0.06);
    border-radius: 16px;
    padding: 18px 20px;
    font-size: 15px;
    color: #fff;
    text-align: left;
    cursor: pointer;
    font-family: inherit;
    line-height: 1.4;
    transition: transform 0.3s cubic-bezier(0.22, 1, 0.36, 1),
                border-color 0.25s ease,
                background 0.25s ease,
                box-shadow 0.3s ease;
    -webkit-tap-highlight-color: transparent;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    overflow: hidden;
    animation: optionIn 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
  }
  .option:nth-child(1) { animation-delay: 0.05s; }
  .option:nth-child(2) { animation-delay: 0.13s; }
  .option:nth-child(3) { animation-delay: 0.21s; }
  @keyframes optionIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .option:hover {
    background: rgba(26,26,26,0.95);
    border-color: rgba(255, 255, 255, 0.14);
    transform: translateY(-1px);
  }
  .option:active { transform: scale(0.985); }
  .option.selected {
    background: rgba(0, 200, 83, 0.12);
    border-color: #00C853;
    transform: scale(1.015);
    box-shadow:
      0 0 0 4px rgba(0, 200, 83, 0.15),
      0 12px 32px rgba(0, 200, 83, 0.25);
  }
  .option.selected::after {
    content: '✓';
    position: absolute;
    right: 18px; top: 50%;
    transform: translateY(-50%) scale(0);
    width: 24px; height: 24px;
    background: #00C853;
    color: #000;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700;
    animation: pop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
  }
  @keyframes pop {
    to { transform: translateY(-50%) scale(1); }
  }

  /* =========================================================
     LOADING (between quiz & result)
  ========================================================= */
  .loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 60px 0;
    animation: slideIn 0.4s ease both;
  }
  .loading-text {
    font-size: 14px;
    color: rgba(255,255,255,0.7);
    margin-top: 18px;
    letter-spacing: -0.01em;
  }
  .spinner {
    width: 38px; height: 38px;
    border-radius: 50%;
    border: 2.5px solid rgba(255,255,255,0.1);
    border-top-color: #00C853;
    animation: spin 0.9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* =========================================================
     RESULT
  ========================================================= */
  .result {
    animation: resultIn 0.7s cubic-bezier(0.22, 1, 0.36, 1) both;
  }
  @keyframes resultIn {
    from { opacity: 0; transform: scale(0.96) translateY(10px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  .result-emoji {
    font-size: 64px;
    text-align: center;
    margin-bottom: 14px;
    animation: bounceIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) both 0.1s;
    display: block;
  }
  @keyframes bounceIn {
    from { opacity: 0; transform: scale(0.4); }
    to   { opacity: 1; transform: scale(1); }
  }
  .result-title {
    font-size: 28px;
    font-weight: 700;
    text-align: center;
    letter-spacing: -0.028em;
    margin-bottom: 14px;
    background: linear-gradient(180deg, #fff, #a8a8a8);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    line-height: 1.2;
  }
  .result-text {
    font-size: 15px;
    color: rgba(255, 255, 255, 0.72);
    text-align: center;
    line-height: 1.65;
    margin-bottom: 36px;
    letter-spacing: -0.005em;
  }

  /* =========================================================
     OFFER CARD
  ========================================================= */
  .offer {
    position: relative;
    background: linear-gradient(180deg, #141414 0%, #0c0c0c 100%);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 28px;
    padding: 28px 24px;
    box-shadow:
      0 40px 80px rgba(0, 0, 0, 0.6),
      0 0 0 1px rgba(0, 200, 83, 0.04);
    overflow: hidden;
  }
  .offer::before {
    content: '';
    position: absolute;
    top: -1px; left: -1px; right: -1px; bottom: -1px;
    border-radius: 28px;
    padding: 1px;
    background: linear-gradient(135deg, rgba(0,200,83,0.4), transparent 40%, transparent 60%, rgba(0,200,83,0.25));
    -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite: xor;
            mask-composite: exclude;
    pointer-events: none;
    opacity: 0.7;
  }

  .offer-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(0, 200, 83, 0.12);
    border: 1px solid rgba(0, 200, 83, 0.3);
    color: #00E676;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 6px 12px;
    border-radius: 999px;
    margin-bottom: 14px;
  }

  .offer-title {
    font-size: 19px;
    font-weight: 700;
    letter-spacing: -0.022em;
    margin-bottom: 10px;
    line-height: 1.25;
  }
  .offer-desc {
    font-size: 14px;
    color: rgba(255, 255, 255, 0.6);
    margin-bottom: 22px;
    line-height: 1.55;
  }

  .benefits { list-style: none; display: flex; flex-direction: column; gap: 12px; margin-bottom: 22px; }
  .benefits li {
    display: flex;
    gap: 12px;
    font-size: 14px;
    color: rgba(255, 255, 255, 0.88);
    line-height: 1.45;
    align-items: flex-start;
    opacity: 0;
    transform: translateX(-6px);
    animation: benefitIn 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
  }
  .benefits li:nth-child(1) { animation-delay: 0.25s; }
  .benefits li:nth-child(2) { animation-delay: 0.32s; }
  .benefits li:nth-child(3) { animation-delay: 0.39s; }
  .benefits li:nth-child(4) { animation-delay: 0.46s; }
  .benefits li:nth-child(5) { animation-delay: 0.53s; }
  @keyframes benefitIn {
    to { opacity: 1; transform: translateX(0); }
  }
  .benefits .check {
    flex-shrink: 0;
    width: 20px; height: 20px;
    border-radius: 50%;
    background: rgba(0, 200, 83, 0.15);
    border: 1px solid rgba(0, 200, 83, 0.35);
    display: flex; align-items: center; justify-content: center;
    color: #00E676;
    font-size: 11px;
    font-weight: 700;
    margin-top: 1px;
  }

  .bonus {
    background: linear-gradient(135deg, rgba(0,200,83,0.08), rgba(255,255,255,0.02));
    border: 1px solid rgba(0, 200, 83, 0.18);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius: 16px;
    padding: 16px 18px;
    font-size: 13.5px;
    color: rgba(255, 255, 255, 0.9);
    line-height: 1.55;
    margin-bottom: 24px;
  }
  .bonus strong { color: #00E676; }

  .price {
    text-align: center;
    margin-bottom: 18px;
  }
  .price-label {
    display: block;
    font-size: 11px;
    color: rgba(255,255,255,0.45);
    letter-spacing: 0.14em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .price-old {
    color: rgba(255, 255, 255, 0.4);
    text-decoration: line-through;
    font-size: 16px;
    margin-right: 12px;
    font-weight: 500;
  }
  .price-new {
    color: #00E676;
    font-size: 44px;
    font-weight: 800;
    letter-spacing: -0.035em;
    display: inline-block;
    text-shadow: 0 0 28px rgba(0, 200, 83, 0.45);
    line-height: 1;
  }
  .price-suffix {
    font-size: 16px;
    font-weight: 600;
    color: #00E676;
    margin-left: 4px;
    opacity: 0.8;
  }
  .price-save {
    display: inline-block;
    margin-top: 10px;
    font-size: 12px;
    font-weight: 600;
    color: #00E676;
    background: rgba(0, 200, 83, 0.1);
    padding: 4px 10px;
    border-radius: 999px;
  }

  .countdown {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    text-align: center;
    font-size: 13px;
    color: rgba(255, 255, 255, 0.7);
    margin-bottom: 20px;
    font-variant-numeric: tabular-nums;
  }
  .countdown-time {
    color: #fff;
    font-weight: 700;
    background: rgba(255,255,255,0.06);
    padding: 4px 10px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.08);
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.02em;
  }
  .countdown.expired {
    color: #ff6b6b;
    font-weight: 500;
  }

  .cta {
    position: relative;
    display: block;
    width: 100%;
    text-align: center;
    text-decoration: none;
    background: linear-gradient(135deg, #00E676 0%, #00C853 50%, #00a843 100%);
    color: #fff;
    font-weight: 700;
    font-size: 15.5px;
    padding: 19px 20px;
    border-radius: 16px;
    letter-spacing: -0.01em;
    box-shadow:
      0 10px 30px rgba(0, 200, 83, 0.4),
      inset 0 1px 0 rgba(255,255,255,0.2);
    transition: transform 0.25s cubic-bezier(0.22, 1, 0.36, 1),
                box-shadow 0.3s ease;
    animation: pulse 2.6s ease-in-out infinite;
    overflow: hidden;
  }
  .cta::before {
    content: '';
    position: absolute;
    top: 0; left: -75%;
    width: 50%; height: 100%;
    background: linear-gradient(110deg, transparent, rgba(255,255,255,0.35), transparent);
    transform: skewX(-20deg);
    animation: shine 3.2s ease-in-out infinite;
  }
  @keyframes shine {
    0%   { left: -75%; }
    60%  { left: 130%; }
    100% { left: 130%; }
  }
  .cta:hover {
    transform: translateY(-2px);
    box-shadow:
      0 18px 44px rgba(0, 200, 83, 0.55),
      inset 0 1px 0 rgba(255,255,255,0.25);
  }
  .cta:active { transform: translateY(0) scale(0.99); }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 10px 30px rgba(0, 200, 83, 0.4), inset 0 1px 0 rgba(255,255,255,0.2); }
    50%      { box-shadow: 0 14px 44px rgba(0, 200, 83, 0.7), inset 0 1px 0 rgba(255,255,255,0.25); }
  }

  /* Trust row */
  .trust {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 16px;
    margin-top: 16px;
    flex-wrap: wrap;
  }
  .trust-item {
    display: flex; align-items: center; gap: 6px;
    font-size: 11.5px;
    color: rgba(255,255,255,0.55);
    letter-spacing: -0.005em;
  }
  .trust-item svg { width: 13px; height: 13px; flex-shrink: 0; }

  .footer-note {
    text-align: center;
    font-size: 11.5px;
    color: rgba(255, 255, 255, 0.42);
    margin-top: 14px;
    line-height: 1.5;
  }

  /* Scarcity */
  .scarcity {
    margin-top: 14px;
    text-align: center;
    font-size: 12px;
    color: rgba(255,255,255,0.55);
  }
  .scarcity strong { color: #fff; font-weight: 600; }

  /* Tiny screens */
  @media (max-width: 375px) {
    .app { padding: 20px 16px 50px; }
    .title { font-size: 22px; }
    .question-text { font-size: 19px; }
    .price-new { font-size: 38px; }
    .offer { padding: 24px 20px; border-radius: 24px; }
    .result-title { font-size: 25px; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.001ms !important;
      transition-duration: 0.001ms !important;
    }
  }
</style>
</head>
<body>
  <main class="app">

    <div class="top-badge">
      <span class="dot"></span>
      Quiz exclusivo • Moçambique 2026
    </div>

    <header class="header">
      <!-- 🔁 ALTERAR FOTO DE PERFIL aqui: substitui o conteúdo por <img src="foto.jpg" alt="" style="width:100%;height:100%;border-radius:50%;object-fit:cover"> -->
      <div class="avatar" aria-hidden="true">W</div>
      <h1 class="title">Descobre o teu nível de vendas no WhatsApp em 2026</h1>
      <p class="subtitle">Responde a 5 perguntas rápidas e recebe um plano personalizado.</p>
    </header>

    <div class="progress-wrap" aria-hidden="true">
      <div class="progress-bar" id="progressBar"></div>
    </div>
    <div class="progress-meta">
      <span id="stepLabel">Pergunta 1 de 5</span>
      <span id="percentLabel">0%</span>
    </div>

    <section id="quiz" aria-live="polite"></section>
    <section id="result" aria-live="polite"></section>
  </main>

<script>
/* =========================================================
   CONFIG
========================================================= */
// 🔁 ALTERAR LINK DE CHECKOUT aqui:
const CHECKOUT_URL = 'https://checkout.escalepay.com/6377030';
const COUNTDOWN_MINUTES = 15;

const questions = [
  {
    q: 'Como descreves a tua relação com as vendas pelo WhatsApp hoje?',
    options: [
      { key: 'A', text: 'Só uso para conversas pessoais, nunca vendi nada.' },
      { key: 'B', text: 'Já envio catálogos e uso os estados, mas as vendas são poucas.' },
      { key: 'C', text: 'Tenho lista de transmissão e fecho algumas vendas, mas sinto que podia vender muito mais.' },
    ],
  },
  {
    q: 'Qual é o teu maior desafio ao tentar vender pelo WhatsApp?',
    options: [
      { key: 'A', text: 'Não sei por onde começar.' },
      { key: 'B', text: 'Falo com os clientes mas eles somem e não compram.' },
      { key: 'C', text: 'Quero escalar as minhas vendas sem ficar o dia inteiro no telemóvel.' },
    ],
  },
  {
    q: 'Quando pensas em WhatsApp, qual é a tua maior frustração?',
    options: [
      { key: 'A', text: 'Parece que só funciona para quem já tem muitos contactos.' },
      { key: 'B', text: 'Eu mando mensagens, mas parece que estou a incomodar.' },

  },
  B: {

    title: 'És um Comunicador com Potência',
    text: 'Já tens movimento, mas as conversas ainda não se transformam em dinheiro consistente. O que te falta é um sistema simples de follow-up e gatilhos que fazem o cliente decidir comprar. No e-book revelo o método “Funil do Status” que em Moçambique está a duplicar vendas sem enviar spam.',
  },

  },
};

/* =========================================================
   STATE
========================================================= */
let currentQ = 0;
const answers = [];

const quizEl = document.getElementById('quiz');
const resultEl = document.getElementById('result');
const progressBar = document.getElementById('progressBar');
const stepLabel = document.getElementById('stepLabel');
const percentLabel = document.getElementById('percentLabel');

/* =========================================================
   QUIZ RENDER
========================================================= */
function updateProgress(step) {
  const pct = Math.round((step / questions.length) * 100);
  progressBar.style.width = pct + '%';
  percentLabel.textContent = pct + '%';
  if (step < questions.length) {
    stepLabel.textContent = `Pergunta ${step + 1} de ${questions.length}`;
  } else {
    stepLabel.textContent = 'Análise concluída';
  }
}

function renderQuestion(index) {
  updateProgress(index);
  const q = questions[index];
  quizEl.innerHTML = `
    <div class="question" data-key="${index}">
      <div class="question-label">Pergunta ${index + 1} / ${questions.length}</div>
      <h2 class="question-text">${q.q}</h2>
      <div class="options">
        ${q.options.map((opt, i) => `
          <button class="option" data-key="${opt.key}" data-index="${i}" type="button">${opt.text}</button>
        `).join('')}
      </div>
    </div>
  `;

  const questionEl = quizEl.querySelector('.question');
  const buttons = quizEl.querySelectorAll('.option');
  buttons.forEach(btn => {
    btn.addEventListener('click', () => {
      if (btn.classList.contains('selected')) return;
      buttons.forEach(b => b.disabled = true);
      btn.classList.add('selected');
      answers.push(btn.dataset.key);

      // Haptic feedback if available
      if (window.navigator.vibrate) navigator.vibrate(8);

      setTimeout(() => {
        questionEl.classList.add('out');
        setTimeout(() => {
          currentQ++;
          if (currentQ < questions.length) {
            renderQuestion(currentQ);
          } else {
            showLoading();
          }
        }, 280);
      }, 480);
    });
  });
}

/* =========================================================
   LOADING TRANSITION
========================================================= */
function showLoading() {
  updateProgress(questions.length);
  quizEl.innerHTML = `
    <div class="loading">
      <div class="spinner"></div>
      <div class="loading-text" id="loadingText">A analisar as tuas respostas…</div>
    </div>
  `;
  const texts = [
    'A analisar as tuas respostas…',
    'A cruzar com dados do mercado moçambicano…',
    'A preparar o teu plano personalizado…',
  ];
  let i = 0;
  const lt = document.getElementById('loadingText');
  const interval = setInterval(() => {
    i++;
    if (i >= texts.length) { clearInterval(interval); return; }
    lt.style.opacity = '0';
    setTimeout(() => { lt.textContent = texts[i]; lt.style.opacity = '1'; }, 200);
  }, 700);

  setTimeout(() => {
    clearInterval(interval);
    quizEl.innerHTML = '';
    showResult();
  }, 2200);
}

/* =========================================================
   RESULT
========================================================= */
function computeProfile() {
  const counts = { A: 0, B: 0, C: 0 };
  answers.forEach(a => counts[a]++);
  let winner = 'A';
  let max = -1;
  ['A', 'B', 'C'].forEach(k => {
    if (counts[k] > max) { max = counts[k]; winner = k; }
  });
  return winner;
}

function showResult() {
  const profile = profiles[computeProfile()];

  resultEl.innerHTML = `
    <div class="result">

      <h2 class="result-title">${profile.title}</h2>

        <ul class="benefits">

        </ul>

        <div class="bonus">
          🎁 <strong>Bónus (só hoje):</strong> 10 templates de mensagens prontas + mini-treino em áudio “O segredo da primeira venda em 24h”.
        </div>

        <div class="price">

          <div>
            <span class="price-old">720 MZN</span>
            <span class="price-new" id="priceNew">430</span><span class="price-suffix">MZN</span>
          </div>
          <span class="price-save">Poupas 290 MZN (40%)</span>
        </div>

        <div class="countdown" id="countdown">
          ⏳ Oferta expira em <span class="countdown-time" id="countdownTime">15:00</span>
        </div>

        <!-- 🔁 ALTERAR LINK DE CHECKOUT em CHECKOUT_URL no topo do script -->
        <a class="cta" href="${CHECKOUT_URL}" target="_blank" rel="noopener">
          QUERO O E-BOOK AGORA →
        </a>

        <div class="trust">

            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2l8 4v6c0 5-3.5 9-8 10-4.5-1-8-5-8-10V6l8-4z"/></svg>
            Pagamento seguro
          </div>
          <div class="trust-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 13l4 4L19 7"/></svg>
            Acesso imediato
          </div>
          <div class="trust-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>
            7 dias de garantia
          </div>
        </div>

        <p class="footer-note">Pagamento via M-Pesa, M-Kesh ou cartão. Acesso imediato após confirmação.</p>
        <div class="scarcity">🔥 <strong id="seatsLeft">37 pessoas</strong> a visualizar esta oferta agora</div>
      </div>
    </div>
  `;

  animatePrice();
  startCountdown(COUNTDOWN_MINUTES * 60);
  animateSeats();

/* =========================================================
   PRICE COUNT-UP
========================================================= */
function animatePrice() {
  const el = document.getElementById('priceNew');
  if (!el) return;
  const target = 430;
  const duration = 900;
  const start = performance.now();
  function frame(now) {
    const p = Math.min(1, (now - start) / duration);
    const eased = 1 - Math.pow(1 - p, 3);
    el.textContent = Math.round(eased * target);
    if (p < 1) requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
}

/* =========================================================
   SCARCITY (subtle live count)
========================================================= */
function animateSeats() {
  const el = document.getElementById('seatsLeft');
  if (!el) return;
  setInterval(() => {
    const base = 32 + Math.floor(Math.random() * 12);
    el.textContent = `${base} pessoas`;
  }, 4500);
}

/* =========================================================
   COUNTDOWN
========================================================= */
function startCountdown(seconds) {
  const wrap = document.getElementById('countdown');
  const timeEl = document.getElementById('countdownTime');
  let remaining = seconds;

  const tick = () => {
    if (remaining <= 0) {
      wrap.classList.add('expired');
      wrap.innerHTML = '⛔ Oferta expirada. O preço promocional já não está disponível.';
      return;
    }
    const m = String(Math.floor(remaining / 60)).padStart(2, '0');
    const s = String(remaining % 60).padStart(2, '0');
    timeEl.textContent = `${m}:${s}`;
    remaining--;
  };

  tick();
  setInterval(tick, 1000);
}

/* =========================================================
   START
========================================================= */
renderQuestion(0);
</script>
